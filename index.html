<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow </title>
    <link href="./css/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-500 via-primary-600 to-secondary-500 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 transition-colors duration-500 p-5">


<aside class="w-full max-w-2xl mx-auto mb-8">
    <header>
        <div class="relative flex justify-center items-center">

            <h1 class="flex gap-2 text-5xl md:text-6xl font-bold text-white drop-shadow-lg">
                <span class="logo-letter">T</span>
                <span class="logo-letter">o</span>
                <span class="w-6 md:w-8"></span>
                <span class="logo-letter">D</span>
                <span class="logo-letter">o</span>
            </h1>

            <button
                    id="themeToggle"
                    class="absolute right-0 top-1/2 -translate-y-1/2 bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-full px-4 md:px-5 py-2 md:py-3 text-xl md:text-2xl hover:bg-white/30 hover:scale-110 active:scale-95 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-white/50 shadow-lg"
                    aria-label="Cambiar tema">
                <span class="dark:hidden">☀️</span>
                <span class="hidden dark:inline">🌙</span>
            </button>
        </div>
    </header>
</aside>


<main class="w-full max-w-2xl mx-auto">
    <section class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl dark:shadow-gray-900/50 p-6 md:p-8 transition-all duration-500">


        <div class="mb-6">
            <input
                    type="text"
                    id="searchInput"
                    placeholder="🔍 Buscar tareas..."
                    class="w-full px-5 py-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-base bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:border-primary-500 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-100 dark:focus:ring-primary-900/50 transition-all duration-300 hover:border-primary-300 dark:hover:border-primary-600 shadow-sm hover:shadow-md">
        </div>

        <div class="grid grid-cols-1 gap-3 mb-8">

            <input
                    type="text"
                    id="taskInput"
                    placeholder="¿Qué tenía que hacer...?"
                    class="px-5 py-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-base bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:border-primary-500 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-100 dark:focus:ring-primary-900/50 transition-all duration-300 hover:border-primary-300 dark:hover:border-primary-600 shadow-sm hover:shadow-md">


            <div class="grid grid-cols-[1fr_1fr_auto] gap-3">
                <select
                        id="categorySelect"
                        class="px-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 cursor-pointer focus:outline-none focus:border-primary-500 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-100 dark:focus:ring-primary-900/50 transition-all duration-300 hover:border-primary-300 dark:hover:border-primary-600 shadow-sm hover:shadow-md">
                    <option value="Personal">Personal</option>
                    <option value="Trabajo">Trabajo</option>
                    <option value="Estudio">Estudio</option>
                </select>

                <select
                        id="prioritySelect"
                        class="px-4 py-2.5 border-2 border-gray-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 cursor-pointer focus:outline-none focus:border-primary-500 dark:focus:border-primary-400 focus:ring-4 focus:ring-primary-100 dark:focus:ring-primary-900/50 transition-all duration-300 hover:border-primary-300 dark:hover:border-primary-600 shadow-sm hover:shadow-md">
                    <option value="Esencial">Esencial</option>
                    <option value="Intermedio">Intermedio</option>
                    <option value="Opcional">Opcional</option>
                </select>


                <button
                        id="addTaskButton"
                        class="px-6 py-2 bg-gradient-to-r from-primary-500 to-secondary-500 hover:from-primary-600 hover:to-secondary-600 text-white rounded-xl text-2xl font-bold shadow-lg hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:focus:ring-primary-700">
                        +
                </button>
            </div>
        </div>


        <ul id="taskList" class="space-y-3"></ul>


        <div id="emptyState" class="hidden text-center py-12">
            <p class="text-gray-400 dark:text-gray-500 text-lg"> No hay tareas aún</p>
            <p class="text-gray-400 dark:text-gray-500 text-sm mt-2">Añade tu primera tarea arriba</p>
        </div>

    </section>
</main>

<script src="script.js"></script>
</body>
</html>
